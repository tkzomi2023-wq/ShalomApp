<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Drop shadow for the inner elements -->
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#022c22" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Clean rounded squircle background matching iOS & Android splash guidelines -->
  <rect width="512" height="512" rx="112" fill="#ffffff" />
  
  <g filter="url(#soft-shadow)">
    <!-- Outer green rounded arms -->
    <rect x="184" y="96" width="144" height="320" rx="72" fill="#059669" />
    <rect x="96" y="184" width="320" height="144" rx="72" fill="#059669" />
    
    <!-- Inner hollow white rounded arms -->
    <rect x="232" y="144" width="48" height="224" rx="24" fill="#ffffff" />
    <rect x="144" y="232" width="224" height="48" rx="24" fill="#ffffff" />
    
    <!-- Quadrant circles representing fellowship members -->
    <circle cx="140" cy="140" r="28" fill="#059669" />
    <circle cx="372" cy="140" r="28" fill="#059669" />
    <circle cx="372" cy="372" r="28" fill="#059669" />
    <circle cx="140" cy="372" r="28" fill="#059669" />
  </g>
</svg>
